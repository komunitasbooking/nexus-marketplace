<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus MarketPlace</title>
    
    <!-- Memanggil File Manifest Resmi -->
    <link rel="manifest" href="manifest.json">

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        iframe { border: none; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <!-- URL Aplikasi GAS Anda -->
    <iframe src="https://script.google.com/macros/s/AKfycbyG4D-nC5F78C7JzuvPNTJDIWGZ680kz3tZ8r5NjyG3Cm8P0Zn2__aj2FG-VG7bOLWR/exec?role=marketplace"></iframe>

    <script>
        // Mendaftarkan File Service Worker Resmi
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(() => console.log("Service Worker Terdaftar!"))
            .catch(err => console.log("Gagal:", err));
        }
    </script>
</body>
</html>
